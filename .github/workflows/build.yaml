name: Run Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      # CLI call to simulated build process
      - name: Run Build
        run: |
          appName="Test App"
          bash ./build.sh --platform Android --project-name "$appName"

      # CLI call to simulated upload process
      - name: Upload
        run: |
          find build/Android -type f | while read -r artifact
          do
            bash ./upload.sh android "$artifact"
          done